resources:
  pipelines:
    research_pipeline:
      name: "Meridian Research Pipeline"
      catalog: ${var.catalog_name}
      target: "meridian_research"
      development: true
      channel: PREVIEW
      serverless: true
      libraries:
        - notebook:
            path: ../src/pipelines/research/bronze_pubmed.py
        - notebook:
            path: ../src/pipelines/research/bronze_arxiv.py
        - notebook:
            path: ../src/pipelines/research/bronze_crossref.py
        - notebook:
            path: ../src/pipelines/research/silver_research.py
        - notebook:
            path: ../src/pipelines/research/gold_research.py
      configuration:
        meridian.catalog: ${var.catalog_name}
      permissions:
        - level: CAN_VIEW
          group_name: users

    internal_pipeline:
      name: "Meridian Internal Pipeline"
      catalog: ${var.catalog_name}
      target: "meridian_internal"
      development: true
      channel: PREVIEW
      serverless: true
      libraries:
        - notebook:
            path: ../src/pipelines/internal/bronze_crm.py
        - notebook:
            path: ../src/pipelines/internal/bronze_web_events.py
        - notebook:
            path: ../src/pipelines/internal/bronze_financials.py
        - notebook:
            path: ../src/pipelines/internal/silver_internal.py
        - notebook:
            path: ../src/pipelines/internal/gold_internal.py
      configuration:
        meridian.catalog: ${var.catalog_name}
      permissions:
        - level: CAN_VIEW
          group_name: users

