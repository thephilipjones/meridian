resources:
  jobs:
    setup_job:
      name: "Meridian — Setup (Catalog, Schemas, Volumes)"
      run_as:
        user_name: ${workspace.current_user.userName}
      tasks:
        - task_key: run_setup
          notebook_task:
            notebook_path: ../src/notebooks/00_setup.py
            base_parameters:
              catalog_name: ${var.catalog_name}
      permissions:
        - level: CAN_MANAGE
          group_name: users

    data_gen_job:
      name: "Meridian — Generate Synthetic Data"
      run_as:
        user_name: ${workspace.current_user.userName}
      tasks:
        - task_key: gen_crm
          notebook_task:
            notebook_path: ../src/data_gen/generate_crm.py
            base_parameters:
              catalog_name: ${var.catalog_name}
        - task_key: gen_web_events
          notebook_task:
            notebook_path: ../src/data_gen/generate_web_events.py
            base_parameters:
              catalog_name: ${var.catalog_name}
        - task_key: gen_financials
          notebook_task:
            notebook_path: ../src/data_gen/generate_financials.py
            base_parameters:
              catalog_name: ${var.catalog_name}
        - task_key: gen_pubmed
          notebook_task:
            notebook_path: ../src/data_gen/generate_pubmed.py
            base_parameters:
              catalog_name: ${var.catalog_name}
        - task_key: gen_sec_filings
          notebook_task:
            notebook_path: ../src/data_gen/generate_sec_filings.py
            base_parameters:
              catalog_name: ${var.catalog_name}
        - task_key: gen_fda_actions
          notebook_task:
            notebook_path: ../src/data_gen/generate_fda_actions.py
            base_parameters:
              catalog_name: ${var.catalog_name}
        - task_key: gen_patents
          notebook_task:
            notebook_path: ../src/data_gen/generate_patents.py
            base_parameters:
              catalog_name: ${var.catalog_name}
      permissions:
        - level: CAN_MANAGE
          group_name: users

    data_fetch_job:
      name: "Meridian — Fetch Real Data (Optional)"
      run_as:
        user_name: ${workspace.current_user.userName}
      tasks:
        - task_key: fetch_pubmed
          notebook_task:
            notebook_path: ../src/data_fetch/fetch_pubmed.py
            base_parameters:
              catalog_name: ${var.catalog_name}
      permissions:
        - level: CAN_MANAGE
          group_name: users

    run_pipelines_job:
      name: "Meridian — Run All Pipelines"
      run_as:
        user_name: ${workspace.current_user.userName}
      tasks:
        - task_key: run_research
          pipeline_task:
            pipeline_id: ${resources.pipelines.research_pipeline.id}
        - task_key: run_internal
          pipeline_task:
            pipeline_id: ${resources.pipelines.internal_pipeline.id}
        - task_key: run_regulatory
          pipeline_task:
            pipeline_id: ${resources.pipelines.regulatory_pipeline.id}
        - task_key: create_metric_views
          notebook_task:
            notebook_path: ../src/notebooks/04_metric_views.py
            base_parameters:
              catalog_name: ${var.catalog_name}
          depends_on:
            - task_key: run_internal
      permissions:
        - level: CAN_MANAGE
          group_name: users

    genie_setup_job:
      name: "Meridian — Genie Space Setup"
      run_as:
        user_name: ${workspace.current_user.userName}
      tasks:
        - task_key: create_spaces
          notebook_task:
            notebook_path: ../src/notebooks/07_create_genie_spaces.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              warehouse_id: ${var.warehouse_id}
        - task_key: enrich_spaces
          notebook_task:
            notebook_path: ../src/notebooks/08_genie_enrichment.py
            base_parameters:
              catalog_name: ${var.catalog_name}
          depends_on:
            - task_key: create_spaces
      permissions:
        - level: CAN_MANAGE
          group_name: users

    daily_refresh_job:
      name: "Meridian — Daily Refresh"
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: "America/New_York"
        pause_status: PAUSED
      run_as:
        user_name: ${workspace.current_user.userName}
      tasks:
        - task_key: run_research
          pipeline_task:
            pipeline_id: ${resources.pipelines.research_pipeline.id}
        - task_key: run_internal
          pipeline_task:
            pipeline_id: ${resources.pipelines.internal_pipeline.id}
        - task_key: run_regulatory
          pipeline_task:
            pipeline_id: ${resources.pipelines.regulatory_pipeline.id}
        - task_key: create_metric_views
          notebook_task:
            notebook_path: ../src/notebooks/04_metric_views.py
            base_parameters:
              catalog_name: ${var.catalog_name}
          depends_on:
            - task_key: run_internal
        - task_key: refresh_system_tables
          notebook_task:
            notebook_path: ../src/notebooks/05_system_tables.py
            base_parameters:
              catalog_name: ${var.catalog_name}
          depends_on:
            - task_key: run_research
            - task_key: run_internal
            - task_key: run_regulatory
        - task_key: sync_vector_search
          notebook_task:
            notebook_path: ../src/notebooks/09_vs_sync.py
            base_parameters:
              catalog_name: ${var.catalog_name}
          depends_on:
            - task_key: run_research
      permissions:
        - level: CAN_MANAGE
          group_name: users
