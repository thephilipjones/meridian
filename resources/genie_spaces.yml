# Genie Space Definitions for Meridian Insights
#
# NOTE: As of March 2026, Genie spaces are not fully declarative in DABs.
# This YAML is documentation only — spaces are managed via REST API.
#
# To create/update spaces:
#   1. Run src/notebooks/07_create_genie_spaces.py (creates spaces, grants perms, binds resources)
#   2. Run src/notebooks/08_genie_enrichment.py (applies SQL snippets — space IDs are widget params)
#
# Each space includes: tables, custom_instructions, and sample_questions.
# These are applied via POST/PATCH /api/2.0/genie/spaces/{space_id}.

genie_spaces:
  research_assistant:
    space_id: "01f118c5d7e01a32a58159a70e55160c"
    name: "Meridian Research Assistant"
    description: "Natural language Q&A over 36M+ biomedical articles, citations, and MeSH terms"
    tables:
      - "${var.catalog_name}.meridian_research.articles"
      - "${var.catalog_name}.meridian_research.authors"
      - "${var.catalog_name}.meridian_research.citations"
      - "${var.catalog_name}.meridian_research.mesh_terms"
    custom_instructions: |
      You are the Meridian Research Assistant, helping researchers explore
      biomedical literature across PubMed, arXiv, and Crossref sources.

      RULES:
      - Always cite paper DOI and first author when referencing findings.
      - When summarizing findings, note the study type (RCT, meta-analysis,
        cohort, case study) and sample size when available.
      - Distinguish between peer-reviewed publications and preprints (arXiv).
        Flag preprints explicitly with "[PREPRINT]" in your response.
      - When asked broad questions, prioritize meta-analyses and systematic
        reviews over individual studies.
      - Include publication year to help the user assess recency.
      - Do not speculate beyond what the data contains — say "the available
        articles suggest..." not "research proves..."
      - When multiple relevant articles exist, summarize the consensus and
        note any conflicting findings.
      - Format DOIs as clickable links when possible.
    sample_questions:
      - "What are the most-cited papers on CRISPR off-target effects?"
      - "Show me meta-analyses published in 2025 on immunotherapy"
      - "Who are the top 10 authors by h-index in our database?"
      - "What MeSH terms have the most articles?"
      - "How many preprints vs peer-reviewed articles do we have by year?"

  regulatory_intelligence:
    space_id: "01f118ce34db1cfeb9085c37cea33f8d"
    name: "Meridian Regulatory Intelligence"
    description: "Natural language Q&A over SEC filings, FDA actions, and patent data"
    tables:
      - "${var.catalog_name}.meridian_regulatory.regulatory_actions"
      - "${var.catalog_name}.meridian_regulatory.patent_landscape"
      - "${var.catalog_name}.meridian_regulatory.company_entities"
      - "${var.catalog_name}.meridian_regulatory.company_risk_signals"
    custom_instructions: |
      You are the Meridian Regulatory Intelligence assistant.

      RULES:
      - Always cite the specific filing ID, source agency, and date in responses.
      - When asked about trends, automatically compare to the prior year period.
      - When referencing companies, include their CIK (SEC) or application
        number (USPTO) for traceability.
      - If a question is ambiguous between SEC and FDA data, ask for clarification.
      - Format monetary values in USD with appropriate scale (thousands,
        millions, billions).
    sample_questions:
      - "How many regulatory actions by source agency in the last year?"
      - "Which companies have the most patent filings?"
      - "Show me high-risk companies with risk signals"
      - "What types of SEC filings are most common?"
      - "Show FDA recall actions by classification and status"

  internal_analytics:
    space_id: "01f118c5ddb81e3dba76005e6020b2bc"
    name: "Meridian Internal Analytics"
    description: "Revenue, pipeline, product usage, and customer health analytics"
    tables:
      - "${var.catalog_name}.meridian_internal.sales_pipeline"
      - "${var.catalog_name}.meridian_internal.product_usage"
      - "${var.catalog_name}.meridian_internal.revenue_summary"
      - "${var.catalog_name}.meridian_internal.customer_health"
    custom_instructions: |
      You are the Meridian Internal Analytics assistant for the RevOps team.

      RULES:
      - Use fiscal quarters (Meridian's FY starts February 1).
      - Always show YoY comparison when discussing revenue or pipeline metrics.
      - When asked about "top customers," rank by ARR unless otherwise specified.
      - Product names: "Regulatory Feed," "Research Platform," "Patent Monitor,"
        "Custom Analytics."
      - When showing pipeline data, include stage conversion rates.
    sample_questions:
      - "What is our total pipeline value by stage?"
      - "Show me revenue by product line for FY2025"
      - "Which accounts are at risk based on health score?"
      - "What is the average deal size by region?"
      - "Which products have the highest error rates?"
