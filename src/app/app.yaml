command:
  - uvicorn
  - backend.main:app
  - --host
  - 0.0.0.0
  - --port
  - "8000"

env:
  - name: DATABRICKS_SERVER_HOSTNAME
    valueFrom: "sql_warehouse.server_hostname"
  - name: DATABRICKS_HTTP_PATH
    valueFrom: "sql_warehouse.http_path"
  - name: MERIDIAN_CATALOG
    value: "serverless_stable_k2zkdm_catalog"
  - name: RESEARCH_GENIE_SPACE_ID
    value: "01f118c5d7e01a32a58159a70e55160c"
  - name: REGULATORY_GENIE_SPACE_ID
    value: "01f118ce34db1cfeb9085c37cea33f8d"
  - name: INTERNAL_GENIE_SPACE_ID
    value: "01f118c5ddb81e3dba76005e6020b2bc"

resources:
  - name: sql_warehouse
    sql_warehouse:
      warehouse_id: "e8eadc734c07e7f5"
      permission: CAN_USE
